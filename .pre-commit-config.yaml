# Pre-commit framework configuration for CommitCraft
# https://pre-commit.com

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Validate commit messages with commitlint using the repo's .commitlintrc.yml,
  # so local enforcement matches the commitlint CI workflow exactly (commitizen
  # was more lenient than CI, letting non-conforming messages through locally).
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
