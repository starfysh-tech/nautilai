name: CommitCraft tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'commitcraft/scripts/**'
      - 'commitcraft/tests/**'

jobs:
  detect-rp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: bash syntax check
        run: bash -n commitcraft/scripts/commitcraft-release-detect-rp.sh
      - name: detect-rp tests
        run: bash commitcraft/tests/detect-rp.test.sh
