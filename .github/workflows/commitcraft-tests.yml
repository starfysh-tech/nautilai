name: CommitCraft tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'commitcraft/scripts/**'
      - 'commitcraft/tests/**'

jobs:
  detect-rp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: bash syntax check
        run: bash -n commitcraft/scripts/commitcraft-release-detect-rp.sh
      - name: detect-rp tests
        run: bash commitcraft/tests/detect-rp.test.sh
