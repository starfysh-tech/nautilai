name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Use a PAT, not GITHUB_TOKEN: events created by GITHUB_TOKEN do not trigger
      # other workflows, so the release PR's required checks would never run and the
      # merge would never re-trigger this workflow to publish the release.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      # Turn the bot's release PR on to auto-merge so a green build publishes the
      # release with no human step. GitHub holds the merge until required checks pass.
      - name: Enable auto-merge on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        # -R is required: this job has no checkout, so without it `gh pr merge`
        # tries to resolve the repo from local git and fails ("not a git repository").
        run: gh pr merge --auto --squash -R "${{ github.repository }}" "${{ fromJson(steps.release.outputs.pr).number }}"
