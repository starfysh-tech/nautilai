name: Validate plugins

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # Catches plugin.json / marketplace.json drift (name, description, version,
      # source) before it ships a marketplace listing that lies about what's installed.
      - name: Check marketplace sync
        run: bash .github/scripts/check-marketplace-sync.sh

      # Each top-level dir with a plugin manifest is a plugin. Validate every one so
      # a malformed manifest/skill can't ride a green build into an auto-release.
      - name: Validate every plugin manifest
        run: |
          set -euo pipefail
          shopt -s nullglob
          manifests=(*/.claude-plugin/plugin.json)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "No plugin manifests found" >&2
            exit 1
          fi
          for manifest in "${manifests[@]}"; do
            plugin_dir="$(dirname "$(dirname "$manifest")")"
            echo "::group::validate $plugin_dir"
            claude plugin validate "./$plugin_dir" --strict
            echo "::endgroup::"
          done

      # Hermes ships the skill dir and nothing else, so commitcraft's plugin-root
      # scripts/ + templates/ are mirrored into it. The plugin-root copies stay the
      # source of truth (and are what Claude Code uses); this gate proves the
      # generated mirror hasn't rotted away from them.
      - name: Check Hermes resource mirror
        run: bash hermes/sync-resources.sh --check

      # Bundled-script suites are offline and self-contained (commitcraft stubs
      # gh, relay stubs claude via a PATH shim) — no network, no real CLI calls.
      # Running them in this job keeps them behind the same required status
      # check, and ubuntu doubles as the Linux-portability check for scripts
      # developed on macOS/BSD. Separate steps so a failure attributes to its
      # plugin. jq is preinstalled on ubuntu runners.
      - name: relay script tests
        run: bash relay/tests/scripts.test.sh

      - name: autodev script tests
        run: bash autodev/tests/scripts.test.sh

      - name: commitcraft script tests
        run: bash commitcraft/tests/detect-rp.test.sh

      - name: commitcraft pr-template tests
        run: bash commitcraft/tests/pr-template.test.sh

      - name: phi-scan eval
        run: bash phi-scan/tests/eval/recall-precision.sh

      - name: cc-validate-hooks eval
        run: bash cc-validate-hooks/tests/eval/verdict-match.sh

      # Validate the repo's community-health config against GitHub's own schemas
      # (vendored by check-jsonschema). Pinned so an upstream release can't red-light
      # main on an unrelated commit. python3 is already a CI dep (the sync check is a
      # python heredoc), so pipx adds no new runtime.
      - name: Validate issue & discussion forms
        run: |
          set -euo pipefail
          pipx run check-jsonschema==0.37.4 --builtin-schema vendor.github-issue-forms \
            .github/ISSUE_TEMPLATE/bug.yml .github/ISSUE_TEMPLATE/plugin-request.yml
          pipx run check-jsonschema==0.37.4 --builtin-schema vendor.github-issue-config \
            .github/ISSUE_TEMPLATE/config.yml
          pipx run check-jsonschema==0.37.4 --builtin-schema vendor.github-discussion \
            .github/DISCUSSION_TEMPLATE/q-a.yml .github/DISCUSSION_TEMPLATE/ideas.yml
          pipx run check-jsonschema==0.37.4 --builtin-schema vendor.dependabot \
            .github/dependabot.yml

      # Lint the workflows themselves. ubuntu-latest ships shellcheck, so actionlint
      # also shellchecks every run: block. Pinned to match local verification.
      - name: Lint workflows (actionlint)
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

      # Shellcheck every bundled/test shell script (warning+). ubuntu-latest
      # ships shellcheck. These scripts otherwise had no lint gate, so this
      # catches the class before it reaches external review.
      - name: Shellcheck shell scripts
        run: git ls-files '*.sh' | xargs -r shellcheck -x -S warning
